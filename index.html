<!DOCTYPE html>
<html>
<head>
    <title>Beast Study Hub</title>
    <style>
        body { font-family: sans-serif; display: flex; }
        #sidebar { width: 200px; padding: 20px; border-right: 1px solid #ccc; }
        #main { flex-grow: 1; padding: 20px; }
        .q-box { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3>Subjects</h3>
        <div onclick="loadChapters('Maths')">Mathematics</div>
        <div id="chapter-list"></div>
    </div>
    <div id="main">
        <select id="chapter-select" multiple></select>
        <button onclick="generate()">Generate Test</button>
        <div id="test-area"></div>
    </div>

    <script>
        function loadChapters(subject) {
            // Add your logic to fetch filenames from your /data/subject folder here
            document.getElementById('chapter-select').innerHTML = 
                '<option value="all">All Chapters</option><option value="ch1.pdf">Chapter 1</option>';
        }

        async function generate() {
            const subject = "Maths";
            const chapters = Array.from(document.getElementById('chapter-select').selectedOptions).map(o => o.value);
            
            document.getElementById('test-area').innerText = "Generating...";
            
            const response = await fetch('/api/generate_test', {
                method: 'POST',
                body: JSON.stringify({ subject, chapters })
            });
            const data = await response.json();
            
            let html = "";
            data.questions.forEach((item, index) => {
                html += `<div class="q-box">
                    <p>${index+1}. ${item.q}</p>
                    <input type="text" placeholder="Type your answer here...">
                </div>`;
            });
            document.getElementById('test-area').innerHTML = html;
        }
    </script>
</body>
</html>
